name: Manualy build the repo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install
        run: npm install

      - name: build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: banner-card.js
          path: banner-card.js
